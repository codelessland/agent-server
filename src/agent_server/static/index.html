<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Chat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; display: flex; background: #f5f5f5; }
#sidebar { width: 280px; background: #1a1a2e; color: #fff; display: flex; flex-direction: column; flex-shrink: 0; }
#sidebar h1 { font-size: 16px; padding: 20px; border-bottom: 1px solid #2a2a4e; }
#conv-list { flex: 1; overflow-y: auto; padding: 10px; }
.conv-item { padding: 10px 12px; cursor: pointer; border-radius: 6px; margin-bottom: 4px; font-size: 13px; color: #aaa; transition: .15s; }
.conv-item:hover { background: #2a2a4e; color: #fff; }
.conv-item.active { background: #0f3460; color: #fff; }
#new-btn { margin: 10px; padding: 10px; background: #e94560; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
#new-btn:hover { background: #d63851; }
#main { flex: 1; display: flex; flex-direction: column; }
#chat-header { padding: 16px 24px; border-bottom: 1px solid #e0e0e0; background: #fff; font-size: 14px; color: #666; }
#messages { flex: 1; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; gap: 12px; }
.msg { max-width: 75%; padding: 10px 16px; border-radius: 12px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
.msg.user { align-self: flex-end; background: #0f3460; color: #fff; border-bottom-right-radius: 4px; }
.msg.agent { align-self: flex-start; background: #e8e8e8; color: #333; border-bottom-left-radius: 4px; }
.msg.system { align-self: center; background: transparent; color: #999; font-size: 12px; max-width: 100%; }
.msg.streaming { align-self: flex-start; background: #e8e8e8; color: #333; border-bottom-left-radius: 4px; }
.msg.streaming::after { content: '▊'; animation: blink .8s infinite; }
@keyframes blink { 50% { opacity: 0; } }
#empty-state { flex: 1; display: flex; align-items: center; justify-content: center; color: #bbb; font-size: 14px; }
#input-bar { padding: 16px 24px; background: #fff; border-top: 1px solid #e0e0e0; display: flex; gap: 10px; }
#input-bar input { flex: 1; padding: 10px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
#input-bar input:focus { border-color: #0f3460; }
#input-bar button { padding: 10px 20px; background: #0f3460; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
#input-bar button:disabled { opacity: .5; cursor: not-allowed; }
#input-bar button:hover:not(:disabled) { background: #1a4a8a; }
.status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
.status-dot.idle { background: #999; }
.status-dot.running { background: #4caf50; animation: pulse 1s infinite; }
.status-dot.finished { background: #2196f3; }
.status-dot.error { background: #f44336; }
.status-dot.paused { background: #ff9800; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
</style>
</head>
<body>
<div id="sidebar">
  <h1>🤖 Agent Chat</h1>
  <button id="new-btn" onclick="newConversation()">+ 新对话</button>
  <div id="conv-list"></div>
</div>
<div id="main">
  <div id="chat-header"><span class="status-dot idle" id="status-dot"></span><span id="status-text">请创建或选择一个对话</span></div>
  <div id="messages"><div id="empty-state">选择一个对话开始聊天</div></div>
  <div id="input-bar">
    <input id="msg-input" type="text" placeholder="输入消息..." disabled onkeydown="if(event.key==='Enter') send()">
    <button id="send-btn" disabled onclick="send()">发送</button>
  </div>
</div>

<script>
let currentId = null;
let ws = null;
let conversations = {};

function addConvToList(id) {
  if (document.getElementById('conv-' + id)) return;
  const div = document.createElement('div');
  div.className = 'conv-item';
  div.id = 'conv-' + id;
  div.textContent = '对话 ' + id.slice(0, 8) + '...';
  div.onclick = () => selectConversation(id);
  document.getElementById('conv-list').prepend(div);
}

function selectConversation(id) {
  document.querySelectorAll('.conv-item').forEach(e => e.classList.remove('active'));
  const el = document.getElementById('conv-' + id);
  if (el) el.classList.add('active');
  currentId = id;
  if (ws) ws.close();
  document.getElementById('msg-input').disabled = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('msg-input').focus();
  document.getElementById('messages').innerHTML = '';
  setStatus('idle', '空闲');
  connectWs(id);
}

function setStatus(status, text) {
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot ' + status;
  document.getElementById('status-text').textContent = text;
}

function appendMessage(content, type) {
  const container = document.getElementById('messages');
  const empty = document.getElementById('empty-state');
  if (empty) empty.remove();
  let last = container.lastElementChild;
  if (type === 'streaming' && last && last.classList.contains('streaming')) {
    last.textContent = content;
    return last;
  }
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  div.textContent = content;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

function connectWs(id) {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/sockets/conversations/${id}/events`);
  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.source === 'user') appendMessage(data.content, 'user');
    else if (data.source === 'agent') appendMessage(data.content, 'agent');
    else if (data.content && data.content.startsWith('status:')) {
      const status = data.content.split(':')[1];
      const labels = { idle: '空闲', running: '运行中', paused: '已暂停', finished: '已完成', error: '错误' };
      setStatus(status, labels[status] || status);
    }
  };
  ws.onclose = () => {};
}

async function newConversation() {
  try {
    const res = await fetch('/api/conversations', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
    const data = await res.json();
    addConvToList(data.id);
    selectConversation(data.id);
  } catch (e) { alert('创建失败: ' + e.message); }
}

async function send() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !currentId) return;
  input.value = '';
  appendMessage(text, 'user');
  setStatus('running', '运行中');
  try {
    const res = await fetch(`/api/conversations/${currentId}/events`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: text })
    });
    if (!res.ok) throw new Error(await res.text());
  } catch (e) {
    appendMessage('发送失败: ' + e.message, 'system');
  }
}

window.onload = async () => {
  try {
    const res = await fetch('/api/conversations');
    const list = await res.json();
    list.forEach(id => addConvToList(id));
  } catch (e) {}
};
</script>
</body>
</html>
